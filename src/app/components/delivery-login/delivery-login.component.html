<div class="container">
  <div class="login-card">
    <h2>&#128666; Delivery Partner Login</h2>
    <p class="subtitle">Sign in to start delivering orders</p>

    <div class="form-group">
      <label>Email</label>
      <input [(ngModel)]="email" type="email" placeholder="Enter your email" (keyup.enter)="login()" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input [(ngModel)]="password" type="password" placeholder="Enter your password" (keyup.enter)="login()" />
    </div>

    <p *ngIf="error" class="error">{{ error }}</p>

    <button (click)="login()" [disabled]="loading" class="login-btn">
      {{ loading ? 'Logging in...' : 'Login' }}
    </button>
  </div>
</div>
