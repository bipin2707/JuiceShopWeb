<div class="container">
  <div class="header">
    <h2>Manage Juices</h2>
    <button class="add-btn" (click)="showForm = !showForm">{{ showForm ? 'Cancel' : '+ Add Juice' }}</button>
  </div>

  <div *ngIf="showForm" class="add-form">
    <div class="form-row">
      <input [(ngModel)]="newName" placeholder="Juice name" />
      <input [(ngModel)]="newPrice" type="number" placeholder="Price" min="1" />
      <label class="toggle-label">
        <input type="checkbox" [(ngModel)]="newAvailable" /> Available
      </label>
      <button (click)="addJuice()" class="save-btn">Save</button>
    </div>
  </div>

  <div *ngIf="message" class="alert">{{ message }}</div>
  <div *ngIf="loading" class="loading">Loading...</div>

  <table *ngIf="!loading && juices.length > 0">
    <thead>
      <tr><th>Name</th><th>Price</th><th>Available</th><th>Action</th></tr>
    </thead>
    <tbody>
      <tr *ngFor="let juice of juices">
        <td>{{ juice.name }}</td>
        <td>&#8377; {{ juice.price | number:'1.2-2' }}</td>
        <td>
          <span [class.available]="juice.isAvailable" [class.unavailable]="!juice.isAvailable">
            {{ juice.isAvailable ? 'Yes' : 'No' }}
          </span>
        </td>
        <td>
          <button (click)="toggle(juice)" [class.btn-off]="juice.isAvailable" [class.btn-on]="!juice.isAvailable">
            {{ juice.isAvailable ? 'Disable' : 'Enable' }}
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
