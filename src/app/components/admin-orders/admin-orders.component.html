<div class="container">
  <h2>Manage Orders</h2>
  <div *ngIf="loading" class="loading">Loading...</div>
  <table *ngIf="!loading && orders.length > 0">
    <thead>
      <tr>
        <th>Customer</th>
        <th>Phone</th>
        <th>Juice</th>
        <th>Qty</th>
        <th>Amount</th>
        <th>Status</th>
        <th>Time</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let order of orders">
        <td>
          {{ order.customerName }}
          <div *ngIf="order.location" class="location">&#128205; {{ order.location }}</div>
        </td>
        <td>{{ order.phone }}</td>
        <td>{{ order.juiceName }}</td>
        <td>{{ order.quantity }}</td>
        <td>&#8377; {{ order.amount | number:'1.2-2' }}</td>
        <td>
          <span [ngClass]="{'status-pending': order.status === 'PENDING', 'status-accepted': order.status === 'ACCEPTED', 'status-rejected': order.status === 'REJECTED'}">
            {{ order.status }}
          </span>
        </td>
        <td>{{ order.createdAt }}</td>
        <td>
          <button *ngIf="order.status === 'PENDING'" class="btn-accept" (click)="accept(order)">Accept</button>
          <button *ngIf="order.status === 'PENDING'" class="btn-reject" (click)="reject(order)">Reject</button>
          <a *ngIf="order.status === 'ACCEPTED'" [routerLink]="['/track-order', order.id]" class="btn-track">&#128666; Track</a>
          <span *ngIf="order.status === 'REJECTED'" class="done">-</span>
        </td>
      </tr>
    </tbody>
  </table>
  <div *ngIf="!loading && orders.length === 0" class="empty">No orders yet.</div>
</div>
