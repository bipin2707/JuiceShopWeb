<div class="container">
  <div class="header">
    <h2>&#127865; Sonepur Royal Juice</h2>
    <a routerLink="/cart" class="cart-btn">&#128722; Cart ({{ cart.getItemCount() }})</a>
  </div>

  <div *ngIf="loading" class="loading">Loading juices...</div>

  <div class="juice-grid" *ngIf="!loading">
    <div class="juice-card" *ngFor="let juice of juices">
      <div class="juice-icon">&#127865;</div>
      <h3>{{ juice.name }}</h3>
      <p class="price">&#8377; {{ juice.price | number:'1.2-2' }}</p>

      <div *ngIf="getQty(juice.id) === 0">
        <button class="add-btn" (click)="addToCart(juice)">Add to Cart</button>
      </div>
      <div *ngIf="getQty(juice.id) > 0" class="qty-controls">
        <button class="qty-btn" (click)="decrement(juice.id)">&#8722;</button>
        <span class="qty-value">{{ getQty(juice.id) }}</span>
        <button class="qty-btn" (click)="increment(juice)">&#43;</button>
      </div>
    </div>
    <div *ngIf="juices.length === 0" class="empty">No juices available right now.</div>
  </div>

  <div class="footer">
    <a routerLink="/admin-login" class="admin-link">Admin Login</a>
  </div>
</div>
